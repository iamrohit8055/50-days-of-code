<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <!-- Merge with CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- CSS Boxicons -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="profilecard">
      <div class="image">
        <img src="Profile Pic.jpg" alt="my profile Pic" class="profile-image" />
      </div>
      <div class="textdata">
        <span class="name">Rohit Gupta </span>
        <span class="job">Aspiring Software Developer</span>
      </div>

      <div class="media-buttons">
        <a href="#" style="background-color: #0045d2;" class="link">
          <i class="bx bxl-facebook"></i>
        </a>
        <a href="#" style="background-color: #29cbf1;" class="link">
          <i class="bx bxl-twitter"></i>
        </a>
        <a href="#" style="background-color: #dc2eaf;" class="link">
          <i class="bx bxl-instagram"></i>
        </a>
        <a href="#" style="background-color: #ff0000;" class="link">
          <i class="bx bxl-youtube"></i>
        </a>
      </div>

      <div class="buttons">
        <button class="button">Subscribe</button>
        <button class="button">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class="bx bx-heart"></i>
          <span class="number">60k</span>
        </div>
        <div class="data">
          <i class="bx bx-message-rounded"></i>
          <span class="number">20k</span>
        </div>
        <div class="data">
          <i class="bx bx-share"></i>
          <span class="number">12k</span>
        </div>
      </div>
    </div>
  </body>
</html>
